# Copy to config.yaml. This bot only needs its OWN Telegram token (can be
# a second, different bot from the core engine's) and the path to the
# same shared database the core engine writes to.

telegram_bot_token: "YOUR_CONTROL_BOT_TOKEN"
allowed_chat_id: "YOUR_TELEGRAM_CHAT_ID"   # only this chat can change settings
shared_db_path: "../shared/bot_state.db"
network_label: "testnet"   # just for display in /status, must match core_engine's network
